AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Connect Data Pipeline:
  Creates one S3 bucket, one Kinesis Data Stream,
  one Kinesis Firehose delivery stream, and one Glue Crawler.

Parameters:
  PipelineName:
    Type: String
    Description: Pipeline name, for example ctr, agent, or lens

  S3BucketName:
    Type: String
    Description: Globally unique S3 bucket name

  KinesisStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream

  FirehoseDeliveryStreamName:
    Type: String
    Description: Name of the Kinesis Firehose delivery stream

  GlueDatabaseName:
    Type: String
    Description: Existing Glue Database name

  GlueCrawlerName:
    Type: String
    Description: Name of the Glue Crawler

  FirehoseSourceRoleArn:
    Type: String
    Description: Existing IAM Role ARN for Firehose to read from Kinesis Data Stream

  FirehoseDeliveryRoleArn:
    Type: String
    Description: Existing IAM Role ARN for Firehose to write to S3

  GlueCrawlerRoleArn:
    Type: String
    Description: Existing IAM Role ARN for Glue Crawler

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub '${PipelineName}-bucket'
        - Key: Pipeline
          Value: !Ref PipelineName

  DataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: 1
      RetentionPeriodHours: 24
      Tags:
        - Key: Name
          Value: !Sub '${PipelineName}-stream'
        - Key: Pipeline
          Value: !Ref PipelineName

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseDeliveryStreamName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !Ref FirehoseSourceRoleArn
      S3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        RoleARN: !Ref FirehoseDeliveryRoleArn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: GZIP

  GlueCrawler:
    Type: AWS::Glue::Crawler
    DependsOn: DataBucket
    Properties:
      Name: !Ref GlueCrawlerName
      Role: !Ref GlueCrawlerRoleArn
      DatabaseName: !Ref GlueDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${DataBucket}/'

Outputs:
  BucketName:
    Description: Created S3 bucket name
    Value: !Ref DataBucket

  BucketArn:
    Description: Created S3 bucket ARN
    Value: !GetAtt DataBucket.Arn

  KinesisStreamNameOutput:
    Description: Created Kinesis Data Stream name
    Value: !Ref DataStream

  KinesisStreamArn:
    Description: Created Kinesis Data Stream ARN
    Value: !GetAtt DataStream.Arn

  FirehoseName:
    Description: Created Firehose delivery stream name
    Value: !Ref FirehoseDeliveryStream

  FirehoseArn:
    Description: Created Firehose delivery stream ARN
    Value: !GetAtt FirehoseDeliveryStream.Arn

  GlueCrawlerNameOutput:
    Description: Created Glue Crawler name
    Value: !Ref GlueCrawler